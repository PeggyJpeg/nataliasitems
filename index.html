<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracker</title>
  <!-- Tailwind removed — all styles are custom CSS -->
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fdf2f8 0%, #faf5ff 50%, #ede9fe 100%);
      min-height: 100vh;
    }

    /* Sticky header */
    #site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(to right, #fbcfe8, #e9d5ff);
      border-bottom: 2px solid #f9a8d4;
      box-shadow: 0 2px 8px rgba(236, 72, 153, 0.15);
    }

    /* Filter tabs */
    .tab-btn {
      padding: 8px 18px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 36px;
    }
    .tab-btn.active {
      background: linear-gradient(to right, #ec4899, #a855f7);
      color: white;
      box-shadow: 0 2px 6px rgba(168,85,247,0.4);
    }
    .tab-btn:not(.active) {
      background: white;
      color: #9333ea;
      border: 1.5px solid #e879f9;
    }

    /* Search bar */
    #search-input {
      border: 1.5px solid #f0abfc;
      border-radius: 9999px;
      padding: 9px 16px 9px 38px;
      font-size: 14px;
      outline: none;
      background: white;
      color: #4a044e;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #search-input:focus {
      border-color: #c026d3;
      box-shadow: 0 0 0 3px rgba(192,38,211,0.15);
    }
    #search-input::placeholder { color: #d8b4fe; }

    /* Item card */
    .item-card {
      background: white;
      border: 1.5px solid #fbcfe8;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(236,72,153,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      transition: box-shadow 0.15s;
    }
    .item-card:hover { box-shadow: 0 4px 16px rgba(236,72,153,0.15); }
    .item-card:active { box-shadow: 0 1px 4px rgba(236,72,153,0.1); }

    /* Desktop grid */
    @media (min-width: 768px) {
      #item-list {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
    }
    @media (min-width: 1100px) {
      #item-list {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .item-thumb {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      object-fit: cover;
      border: 1.5px solid #f9a8d4;
      flex-shrink: 0;
      background: #fdf2f8;
    }
    .item-thumb-placeholder {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      border: 1.5px solid #f9a8d4;
      background: linear-gradient(135deg, #fce7f3, #ede9fe);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 24px;
    }

    .item-info { flex: 1; min-width: 0; overflow: hidden; }
    .item-name {
      font-weight: 700;
      font-size: 15px;
      color: #4a044e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    /* Status pills */
    .pill-in {
      display: inline-block;
      background: linear-gradient(to right, #fce7f3, #fdf4ff);
      color: #be185d;
      border: 1px solid #f9a8d4;
      border-radius: 9999px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .pill-out {
      display: inline-block;
      background: linear-gradient(to right, #f3e8ff, #ede9fe);
      color: #7e22ce;
      border: 1px solid #d8b4fe;
      border-radius: 9999px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* Action buttons */
    .btn-checkout {
      background: linear-gradient(to right, #a855f7, #7c3aed);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      min-height: 36px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .btn-checkout:active { opacity: 0.8; }

    .btn-home {
      background: linear-gradient(to right, #ec4899, #db2777);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      min-height: 36px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .btn-home:active { opacity: 0.8; }

    /* Fun buttons */
    .fun-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      min-height: 44px;
      transition: opacity 0.15s;
      max-width: 180px;
    }
    .fun-btn:hover { opacity: 0.88; }
    .fun-btn:active { opacity: 0.75; }
    .btn-motivate { background: linear-gradient(to right, #ec4899, #f472b6); color: white; }
    .btn-joke    { background: linear-gradient(to right, #a855f7, #c084fc); color: white; }
    .btn-fact    { background: linear-gradient(to right, #8b5cf6, #7c3aed); color: white; }

    /* Welcome message — fixed toast, doesn't shift layout */
    #welcome-message {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 420px;
      z-index: 300;
      background: linear-gradient(135deg, #fff0f8, #fdf4ff);
      border: 1.5px solid #f9a8d4;
      border-radius: 14px;
      padding: 14px 40px 14px 16px;
      font-size: 15px;
      color: #be185d;
      font-style: italic;
      font-weight: 600;
      box-shadow: 0 6px 24px rgba(236,72,153,0.25);
      opacity: 1;
      transition: opacity 2s ease;
    }
    #welcome-message.fading { opacity: 0; }
    #welcome-message.hidden { display: none; }
    #welcome-close {
      position: absolute;
      top: 9px;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #f9a8d4;
      line-height: 1;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #welcome-close:hover { color: #ec4899; }

    /* Toast/fun message */
    #fun-message {
      background: white;
      border: 1.5px solid #f9a8d4;
      border-radius: 12px;
      padding: 12px 36px 12px 16px;
      font-size: 14px;
      color: #7e22ce;
      font-style: italic;
      box-shadow: 0 2px 8px rgba(236,72,153,0.1);
      margin-top: 8px;
      display: none;
      position: relative;
    }
    #fun-message-close {
      position: absolute;
      top: 8px;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #c084fc;
      line-height: 1;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #fun-message-close:hover { color: #9333ea; }

    /* FAB */
    #fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 9999px;
      background: linear-gradient(135deg, #ec4899, #a855f7);
      color: white;
      font-size: 28px;
      font-weight: 300;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(168,85,247,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: transform 0.15s;
      line-height: 1;
    }
    #fab:active { transform: scale(0.93); }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(76,5,120,0.35);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: white;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 -4px 24px rgba(168,85,247,0.2);
      border-top: 2px solid #f9a8d4;
    }
    #modal-box h2 {
      font-size: 18px;
      font-weight: 800;
      color: #7e22ce;
      margin-bottom: 16px;
    }
    .modal-label {
      font-size: 13px;
      font-weight: 600;
      color: #9333ea;
      margin-bottom: 4px;
      display: block;
    }
    .modal-input {
      width: 100%;
      border: 1.5px solid #f0abfc;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      color: #4a044e;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    .modal-input:focus { border-color: #c026d3; }
    .btn-add-confirm {
      width: 100%;
      background: linear-gradient(to right, #ec4899, #a855f7);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      min-height: 44px;
    }
    .btn-cancel {
      width: 100%;
      background: white;
      color: #9333ea;
      border: 1.5px solid #e879f9;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      min-height: 44px;
    }

    /* Counter badges */
    .counter-home {
      background: rgba(255,255,255,0.6);
      border: 1px solid #f9a8d4;
      color: #be185d;
      border-radius: 9999px;
      padding: 2px 10px;
      font-size: 13px;
      font-weight: 700;
    }
    .counter-out {
      background: rgba(255,255,255,0.6);
      border: 1px solid #d8b4fe;
      color: #7e22ce;
      border-radius: 9999px;
      padding: 2px 10px;
      font-size: 13px;
      font-weight: 700;
    }

    /* Empty state */
    #empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #c084fc;
      display: none;
    }
    #empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    #empty-state p { font-size: 15px; font-weight: 600; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #f0abfc; border-radius: 2px; }

    /* ─── DETAIL BOTTOM SHEET ─────────────────────────────────── */
    #detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.35);
      justify-content: flex-end;
      align-items: flex-end;
      flex-direction: column;
    }
    #detail-overlay.open { display: flex; }
    #detail-sheet {
      background: white;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 -4px 24px rgba(168,85,247,0.25);
      border-top: 2px solid #f9a8d4;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
      -webkit-overflow-scrolling: touch;
    }
    #detail-overlay.open #detail-sheet { transform: translateY(0); }
    .sheet-handle {
      width: 40px; height: 5px;
      background: #e0c4f4;
      border-radius: 3px;
      margin: 10px auto 4px;
    }
    .sheet-close {
      position: absolute; top: 12px; right: 14px;
      background: rgba(0,0,0,0.06); border: none;
      font-size: 18px; color: #9333ea;
      cursor: pointer; padding: 0;
      line-height: 1;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .sheet-photo-wrap {
      width: 100%; max-height: 320px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #fdf2f8, #ede9fe);
      overflow: hidden; position: relative;
    }
    .sheet-photo-wrap img {
      width: 100%; max-height: 320px;
      object-fit: contain;
    }
    .sheet-photo-placeholder {
      font-size: 64px; padding: 48px 0;
    }
    .sheet-body { padding: 16px 20px 32px; position: relative; }
    .sheet-body .modal-label { margin-top: 8px; }
    .sheet-photo-actions {
      display: flex; gap: 8px; margin-bottom: 10px;
    }
    .sheet-photo-actions label {
      flex: 1;
      text-align: center;
      background: linear-gradient(135deg, #fdf2f8, #faf5ff);
      border: 1.5px solid #f0abfc;
      border-radius: 10px;
      padding: 10px 8px;
      font-size: 13px;
      font-weight: 600;
      color: #9333ea;
      cursor: pointer;
      min-height: 44px;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .btn-status-toggle {
      width: 100%;
      border: none; border-radius: 10px;
      padding: 14px; font-size: 15px; font-weight: 700;
      cursor: pointer; min-height: 44px;
    }
    .btn-status-toggle.is-in {
      background: linear-gradient(to right, #f9a8d4, #e9d5ff);
      color: #7e22ce;
    }
    .btn-status-toggle.is-out {
      background: linear-gradient(to right, #c084fc, #ec4899);
      color: white;
    }
    .btn-delete-item {
      width: 100%;
      background: white;
      color: #e11d48;
      border: 1.5px solid #fda4af;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }
    .btn-save-item {
      width: 100%;
      background: linear-gradient(to right, #ec4899, #a855f7);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      min-height: 44px;
    }
  </style>
</head>
<body>

<!-- WELCOME MESSAGE -->
<div id="welcome-message">
  <button id="welcome-close" onclick="dismissWelcome()" title="Dismiss">✕</button>
  <span id="welcome-text"></span>
</div>

<!-- STICKY HEADER -->
<div id="site-header">
  <div style="max-width:1200px; margin:0 auto; padding:12px 24px 0;">
    <!-- Title row -->
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
      <div>
        <h1 style="font-size:20px; font-weight:900; color:#7e22ce; margin:0; line-height:1.2;">
          🏠 Natalia's House Items
        </h1>
        <div style="display:flex; gap:6px; margin-top:4px; flex-wrap:wrap;">
          <span class="counter-home" id="counter-home">— home</span>
          <span class="counter-out" id="counter-out">— out</span>
        </div>
      </div>
      <div style="font-size:28px;">🧺</div>
    </div>

    <!-- Fun buttons -->
    <div style="display:flex; gap:6px; margin-bottom:10px;">
      <button class="fun-btn btn-motivate" onclick="showFun('motivate')">✨ Motivate</button>
      <button class="fun-btn btn-joke"     onclick="showFun('joke')">😂 Joke</button>
      <button class="fun-btn btn-fact"     onclick="showFun('fact')">🔮 Fact</button>
    </div>

    <!-- Fun message -->
    <div id="fun-message">
      <button id="fun-message-close" onclick="document.getElementById('fun-message').style.display='none'" title="Dismiss">✕</button>
      <span id="fun-message-text"></span>
    </div>

    <!-- Filter tabs -->
    <div style="display:flex; gap:8px; margin-bottom:10px; margin-top:6px;">
      <button class="tab-btn active" id="tab-all"  onclick="setTab('all')">All</button>
      <button class="tab-btn"        id="tab-home" onclick="setTab('home')">🏠 Home</button>
      <button class="tab-btn"        id="tab-out"  onclick="setTab('out')">📦 Out</button>
    </div>

    <!-- Search -->
    <div style="position:relative; margin-bottom:12px;">
      <span style="position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:15px; color:#c084fc; pointer-events:none;">🔍</span>
      <input id="search-input" type="search" placeholder="Search items…" oninput="renderItems()" />
    </div>
  </div>
</div>

<!-- ITEM LIST -->
<div style="max-width:1200px; margin:0 auto; padding:12px 24px 96px;">
  <div id="item-list" style="display:flex; flex-direction:column; gap:10px;"></div>
  <div id="empty-state">
    <div class="emoji">🔍</div>
    <p>No items found</p>
  </div>
</div>

<!-- FAB -->
<button id="fab" onclick="openModal()" title="Add item">+</button>

<!-- DETAIL / EDIT BOTTOM SHEET -->
<div id="detail-overlay" onclick="closeDetailOnBg(event)">
  <div id="detail-sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="closeDetail()">✕</button>
    <div class="sheet-photo-wrap">
      <img id="detail-photo" src="" alt="" style="display:none;" onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
      <div id="detail-photo-placeholder" class="sheet-photo-placeholder">👗</div>
    </div>
    <div class="sheet-body">
      <div class="sheet-photo-actions">
        <label>📷 Take Photo
          <input type="file" id="detail-file-camera" accept="image/*" capture="environment" style="display:none;" onchange="handleDetailFileUpload(event)" />
        </label>
        <label>🖼️ Choose Photo
          <input type="file" id="detail-file-input" accept="image/*" style="display:none;" onchange="handleDetailFileUpload(event)" />
        </label>
      </div>
      <label class="modal-label">Name</label>
      <input type="text" id="detail-name" class="modal-input" placeholder="Item name" />
      <label class="modal-label">Description</label>
      <textarea id="detail-desc" class="modal-input" placeholder="Optional description..." rows="2" style="resize:vertical;font-family:inherit;"></textarea>
      <div style="margin-top:12px; display:flex; flex-direction:column; gap:10px;">
        <button id="detail-status-btn" class="btn-status-toggle is-in" onclick="toggleDetailStatus()">🏠 At House</button>
        <button class="btn-save-item" onclick="saveDetail()">💾 Save Changes</button>
        <button class="btn-delete-item" onclick="deleteDetailItem()">🗑️ Delete Item</button>
      </div>
    </div>
  </div>
</div>

<!-- ADD ITEM MODAL -->
<div id="modal-overlay" onclick="closeModalOnBg(event)">
  <div id="modal-box">
    <h2>✨ Add New Item</h2>
    <label class="modal-label">Item name *</label>
    <input class="modal-input" id="new-name" type="text" placeholder="e.g. Blue dress" />
    <label class="modal-label">Photo URL (optional)</label>
    <input class="modal-input" id="new-photo" type="url" placeholder="https://…" />
    <button class="btn-add-confirm" onclick="addItem()">Add Item</button>
    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

  {id:7,  name:"Suit jacket",                status:"OUT", photo:"https://abacusai-apps-97d68980a932fad435edcae6-us-west-2.s3.us-west-2.amazonaws.com/24031/public/uploads/1771012767259-IMG_5048.jpeg"},
  {id:8,  name:"Calvin Klein bra",           status:"OUT", photo:"https://abacusai-apps-97d68980a932fad435edcae6-us-west-2.s3.us-west-2.amazonaws.com/24031/public/uploads/1771012752728-IMG_5047.jpeg"},

// ─── STATE ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'ntracker_statuses_v1';
const ITEMS_KEY   = 'ntracker_items_v1';

function loadState() {
  // Load custom-added items
  let items = JSON.parse(JSON.stringify(INITIAL_ITEMS));
  try {
    const saved = localStorage.getItem(ITEMS_KEY);
    if (saved) items = JSON.parse(saved);
  } catch(e) {}

  // Overlay saved statuses
  try {
    const statuses = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    items.forEach(item => {
      if (statuses[item.id] !== undefined) item.status = statuses[item.id];
    });
  } catch(e) {}
  return items;
}

function saveState() {
  const statuses = {};
  items.forEach(item => { statuses[item.id] = item.status; });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(statuses));
  localStorage.setItem(ITEMS_KEY, JSON.stringify(items));
}

let items = loadState();
let currentTab = 'all';
let funCycles = {motivate: 0, joke: 0, fact: 0};

// ─── RENDER ─────────────────────────────────────────────────────────────────
function renderItems() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  const list  = document.getElementById('item-list');
  const empty = document.getElementById('empty-state');

  const filtered = items.filter(item => {
    const matchTab = currentTab === 'all'
      || (currentTab === 'home' && item.status === 'IN')
      || (currentTab === 'out'  && item.status === 'OUT');
    const matchSearch = !query || item.name.toLowerCase().includes(query);
    return matchTab && matchSearch;
  });

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    list.innerHTML = filtered.map(item => itemCard(item)).join('');
  }

  updateCounters();
}

function itemCard(item) {
  const isIn = item.status === 'IN';
  const pillHtml = isIn
    ? `<span class="pill-in">🏠 At house</span>`
    : `<span class="pill-out">📦 Checked out</span>`;
  const btnHtml = isIn
    ? `<button class="btn-checkout" onclick="event.stopPropagation();toggleStatus(${item.id})">📦 Out</button>`
    : `<button class="btn-home"     onclick="event.stopPropagation();toggleStatus(${item.id})">🏠 Home</button>`;
  const imgHtml = item.photo
    ? `<img class="item-thumb" src="${escHtml(item.photo)}" alt="${escHtml(item.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" /><div class="item-thumb-placeholder" style="display:none;">👗</div>`
    : `<div class="item-thumb-placeholder">👗</div>`;

  const descHtml = item.description ? `<div style="font-size:12px;color:#9ca3af;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;">${escHtml(item.description)}</div>` : '';
  return `
    <div class="item-card" onclick="openDetail(${item.id})" style="cursor:pointer;position:relative;">
      ${imgHtml}
      <div class="item-info">
        <div class="item-name">${escHtml(item.name)}</div>
        ${descHtml}
        ${pillHtml}
      </div>
      <div style="flex-shrink:0;">
        ${btnHtml}
      </div>
    </div>
  `;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateCounters() {
  const home = items.filter(i => i.status === 'IN').length;
  const out  = items.filter(i => i.status === 'OUT').length;
  document.getElementById('counter-home').textContent = `${home} home`;
  document.getElementById('counter-out').textContent  = `${out} out`;
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────
function toggleStatus(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.status = item.status === 'IN' ? 'OUT' : 'IN';
  saveState();
  renderItems();
}

function setTab(tab) {
  currentTab = tab;
  ['all','home','out'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  renderItems();
}

function showFun(type) {
  const lists = {motivate: MOTIVATIONS, joke: JOKES, fact: FACTS};
  const arr = lists[type];
  const msg = document.getElementById('fun-message');
  const idx = funCycles[type] % arr.length;
  funCycles[type]++;
  document.getElementById('fun-message-text').textContent = arr[idx];
  msg.style.display = 'block';
}

// ─── MODAL ──────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('new-name').value  = '';
  document.getElementById('new-photo').value = '';
  setTimeout(() => document.getElementById('new-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function addItem() {
  const name  = document.getElementById('new-name').value.trim();
  const photo = document.getElementById('new-photo').value.trim();
  if (!name) { document.getElementById('new-name').focus(); return; }
  const maxId = items.reduce((m, i) => Math.max(m, i.id), -1);
  items.push({ id: maxId + 1, name, status: 'IN', photo: photo || '' });
  saveState();
  closeModal();
  setTab('all');
  renderItems();
}

// ─── DETAIL BOTTOM SHEET ────────────────────────────────────────────────────
let detailItemId = null;
let detailStatus = 'IN';
let detailPhotoData = '';

function openDetail(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  detailItemId = id;
  detailStatus = item.status;
  detailPhotoData = '';

  document.getElementById('detail-name').value = item.name || '';
  document.getElementById('detail-desc').value = item.description || '';
  document.getElementById('detail-file-input').value = '';
  document.getElementById('detail-file-camera').value = '';

  updateDetailPhoto(item.photo);
  updateDetailStatusBtn();

  document.getElementById('detail-overlay').classList.add('open');
  setTimeout(() => document.getElementById('detail-name').focus(), 200);
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  detailItemId = null;
}

function closeDetailOnBg(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetail();
}

function updateDetailPhoto(src) {
  const img = document.getElementById('detail-photo');
  const ph = document.getElementById('detail-photo-placeholder');
  if (src) {
    img.src = src;
    img.style.display = 'block';
    ph.style.display = 'none';
  } else {
    img.style.display = 'none';
    ph.style.display = 'block';
  }
}

function updateDetailStatusBtn() {
  const btn = document.getElementById('detail-status-btn');
  if (detailStatus === 'IN') {
    btn.className = 'btn-status-toggle is-in';
    btn.textContent = '🏠 At House — tap to check out';
  } else {
    btn.className = 'btn-status-toggle is-out';
    btn.textContent = '📦 Checked Out — tap to mark home';
  }
}

function toggleDetailStatus() {
  detailStatus = detailStatus === 'IN' ? 'OUT' : 'IN';
  updateDetailStatusBtn();
}

function handleDetailFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    detailPhotoData = ev.target.result;
    updateDetailPhoto(detailPhotoData);
  };
  reader.readAsDataURL(file);
}

function saveDetail() {
  const item = items.find(i => i.id === detailItemId);
  if (!item) return;
  const name = document.getElementById('detail-name').value.trim();
  if (!name) { document.getElementById('detail-name').focus(); return; }

  item.name = name;
  item.description = document.getElementById('detail-desc').value.trim();
  item.status = detailStatus;

  // Photo: use uploaded file if provided, otherwise keep existing
  if (detailPhotoData) {
    item.photo = detailPhotoData;
  }

  saveState();
  renderItems();
  closeDetail();
}

function deleteDetailItem() {
  if (!confirm('Delete this item? This cannot be undone.')) return;
  items = items.filter(i => i.id !== detailItemId);
  saveState();
  renderItems();
  closeDetail();
}
